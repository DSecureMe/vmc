[tox]
envlist = py310

skip_missing_interpreters = true

[testenv]
description = run test suite for the application with {basepython}
deps = -r test_requirements.txt

commands = coverage run -m vmc test_all --settings vmc.config.test_settings -v 2

[testenv:github]
description = run test suite for the application with {basepython} on Github
deps = -r test_requirements.txt

commands = coverage erase
           coverage run --source=vmc -m vmc test_all --settings vmc.config.test_settings -v 2
           coverage xml -i

passenv = ELASTICSEARCH_URL

[coverage:run]
source_pkgs = vmc
omit =
    */tests.py
    */migrations/*
    */fixtures/*

[testenv:lint]
description = run ruff linter
deps = ruff>=0.6.0
commands = ruff check src/vmc

[testenv:security]
description = run bandit security scan
deps = bandit>=1.7.0
commands = bandit -r -ll -s B105,B605,B607,B106 src/vmc
